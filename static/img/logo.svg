<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left page -->
  <path d="M30 50 C30 44 35 40 41 40 L98 40 L98 162 L41 162 C35 162 30 158 30 152 Z"
        fill="rgba(0,212,255,0.07)" stroke="#00d4ff" stroke-width="4"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Right page -->
  <path d="M170 50 C170 44 165 40 159 40 L102 40 L102 162 L159 162 C165 162 170 158 170 152 Z"
        fill="rgba(124,58,237,0.07)" stroke="#7c3aed" stroke-width="4"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Spine -->
  <line x1="100" y1="40" x2="100" y2="162" stroke="url(#spineGrad)" stroke-width="4" filter="url(#glow)"/>

  <!-- Page lines left (cyan) -->
  <line x1="44" y1="68"  x2="90" y2="68"  stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="44" y1="84"  x2="90" y2="84"  stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="44" y1="100" x2="90" y2="100" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="44" y1="116" x2="90" y2="116" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="44" y1="132" x2="72" y2="132" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Page lines right (purple) -->
  <line x1="110" y1="68"  x2="156" y2="68"  stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="110" y1="84"  x2="156" y2="84"  stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="110" y1="100" x2="156" y2="100" stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="110" y1="116" x2="156" y2="116" stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="110" y1="132" x2="138" y2="132" stroke="#a855f7" stroke-width="3" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Spine bottom curve -->
  <path d="M98 162 Q100 172 102 162" fill="none" stroke="url(#spineGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Glowing top dot on spine -->
  <circle cx="100" cy="40" r="5" fill="#00d4ff" filter="url(#glow)"/>
</svg>
